- name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: consist-advantages-accomplished-shame.trycloudflare.com
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          proxy_host: consist-advantages-accomplished-shame.trycloudflare.com
          proxy_port: 443
          proxy_ssh: true
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/ecommerce-website:latest
            docker stop ecommerce-website || true
            docker rm ecommerce-website || true
            docker run -d -p 80:80 --name ecommerce-website \
              ${{ secrets.DOCKER_USERNAME }}/ecommerce-website:latest
