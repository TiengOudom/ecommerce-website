<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopMax Ecommerce</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header -->
    <header>
        <div class="logo">Demo success</div>

        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Products</a></li>
                <li><a href="#">Categories</a></li>
                <li><a href="#">Deals</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>

        <button class="cart-btn" onclick="toggleCart()">
            Cart (<span id="cartCount">0</span>)
        </button>
    </header>

    <!-- Hero -->
    <section class="hero">
        <div class="hero-content">
            <h1>Big Summer Sale</h1>
            <p>Discover premium products at unbeatable prices.</p>
            <button>Shop Now</button>
        </div>
    </section>

    <!-- Search -->
    <section class="search-section">
        <input type="text" id="searchInput" placeholder="Search products...">

        <button class="filter-btn" onclick="filterCategory('All')">
            All
        </button>

        <button class="filter-btn" onclick="filterCategory('Electronics')">
            Electronics
        </button>

        <button class="filter-btn" onclick="filterCategory('Fashion')">
            Fashion
        </button>

        <button class="filter-btn" onclick="filterCategory('Shoes')">
            Shoes
        </button>
    </section>

    <!-- Products -->
    <section class="products">
        <h2>Featured Products</h2>

        <div class="product-grid" id="productGrid"></div>
    </section>

    <!-- Cart -->
    <div class="cart" id="cart">
        <button class="close-cart" onclick="toggleCart()">✕</button>

        <h2>Shopping Cart</h2>

        <div id="cartItems"></div>

        <div class="total">
            Total: $<span id="cartTotal">0</span>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <h3>ShopMax Ecommerce</h3>
        <p>© 2026 All Rights Reserved</p>
    </footer>

    <script src="script.js"></script>

</body>
</html>
